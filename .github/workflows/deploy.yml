name: CI

# NOTE ON DEPLOYMENT
# The production server (Hostinger VPS) is not reachable from GitHub-hosted
# runners (inbound SSH is blocked upstream), and this account lacks the repo
# admin rights required to register a self-hosted runner. Continuous deployment
# is therefore handled *on the server* by a systemd timer (`octo-autopull.timer`)
# that polls this repo every minute and runs `git reset --hard origin/main`
# + `systemctl restart octo` whenever `main` changes. This workflow only
# validates the code on every push so a bad commit is caught before it deploys.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile all sources
        run: python -m compileall -q bot.py config.py db.py openrouter.py cogs

      - name: Import check
        run: |
          python - <<'PY'
          import importlib
          for m in ("config", "db", "openrouter",
                    "cogs.ai_chat", "cogs.cards",
                    "cogs.video_repost", "cogs.scheduler"):
              importlib.import_module(m)
          print("All modules import cleanly.")
          PY
